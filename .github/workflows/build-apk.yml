name: Build PWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Init Bubblewrap
        run: |
          mkdir apk-build && cd apk-build
          bubblewrap init --manifest https://yongpingbone.netlify.app/manifest.json --directory .
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Build APK
        run: |
          cd apk-build
          bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: yongping-app
          path: apk-build/app-release-signed.apk
          retention-days: 30
